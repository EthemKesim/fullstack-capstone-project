apiVersion: apps/v1
kind: Deployment
metadata:
  name: giftapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: giftapp
  template:
    metadata:
      labels:
        app: giftapp
    spec:
      containers:
      - name: giftapp-container
        image: us.icr.io/sn-labs-p77bz4z2fv/giftapp
        ports:
        - containerPort: 3060
      imagePullSecrets:
      - name: icr
---
apiVersion: v1
kind: Service
metadata:
  name: gift-app-service
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 3060
  selector:
    app: giftapp